<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AI Checker STK</title>

<style>

/* ================= BACKGROUND ================= */
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #1f6feb, #174ea6, #3a7bd5, #00c6ff);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ================= CARD ================= */
.card {
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 18px;
    padding: 50px 40px;
    width: 420px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.25);
    text-align: center;
}

/* ================= LOGO ================= */
.logo {
    width: 90px;
    margin-bottom: 20px;
}

/* ================= TITLE ================= */
.card h2 {
    color: white;
    margin-bottom: 8px;
}

.card p {
    color: #f1f1f1;
    font-size: 14px;
    margin-bottom: 30px;
}

/* ================= FORM ================= */
.form-group {
    display: flex;
    flex-direction: column;
    align-items: center;
}

input {
    width: 100%;
    max-width: 320px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
    margin-bottom: 18px;
}

button {
    width: 100%;
    max-width: 320px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: white;
    color: #174ea6;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #f1f1f1;
}

/* ================= ERROR ================= */
.error {
    color: #ffdddd;
    margin-top: 10px;
    font-size: 13px;
}

/* ================= FOOTER ================= */
.footer {
    position: absolute;
    bottom: 20px;
    text-align: center;
    width: 100%;
    font-size: 13px;
    color: white;
    opacity: 0.9;
}

</style>
</head>

<body>

<div class="card">

    <!-- LOGO STK -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h2>AI Checker STK St. Yakobus Merauke</h2>
    <p>Sistem Screening Probabilistik Proposal & Skripsi</p>

    <form method="POST" class="form-group">
        <input type="password" name="password" placeholder="Masukkan Password" required>
        <button type="submit">Masuk ke Sistem</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

</div>

<div class="footer">
    © 2026 Sistem Informasi & Pangkalan Data (SIPD)<br>
    Made with ❤️ for STK St. Yakobus Merauke
</div>

</body>
</html>
